<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tilt Type</title>
  <meta property="og:title" content="Tilt Type">
  <meta property="og:description" content="A typographic experiment. Tilt your device to feel gravity pull the words apart.">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
      color: #f0ede8;
      font-family: 'Georgia', serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    #canvas {
      display: block;
      max-width: 100%;
      max-height: 80vh;
    }

    #hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-style: italic;
      font-size: 14px;
      color: rgba(240, 237, 232, 0.3);
      letter-spacing: 0.05em;
      white-space: nowrap;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    #input-area {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      width: min(90vw, 600px);
      display: flex;
      gap: 0.5rem;
    }

    #text-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      color: #f0ede8;
      font-family: 'Georgia', serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    #text-input:focus {
      border-color: rgba(240, 237, 232, 0.3);
    }

    #text-input::placeholder {
      color: rgba(240, 237, 232, 0.25);
    }

    #render-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 0.6rem 1.2rem;
      color: #f0ede8;
      font-family: 'Georgia', serif;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #render-btn:hover {
      background: rgba(255,255,255,0.14);
    }

    #ios-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
    }

    #ios-modal {
      background: #1a1a1a;
      border: 1px solid rgba(240, 237, 232, 0.12);
      border-radius: 16px;
      padding: 2rem;
      max-width: 300px;
      text-align: center;
      font-family: 'Georgia', serif;
    }

    #ios-modal p {
      color: rgba(240, 237, 232, 0.7);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    #ios-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(240, 237, 232, 0.2);
      border-radius: 8px;
      padding: 0.6rem 1.5rem;
      color: #f0ede8;
      cursor: pointer;
      font-family: 'Georgia', serif;
    }

    #ios-btn:hover { background: rgba(255,255,255,0.15); }
  </style>
</head>
<body>

  <div id="input-area">
    <input id="text-input" type="text" placeholder="Type something..." value="Tilt Type" />
    <button id="render-btn">Render</button>
  </div>

  <canvas id="canvas"></canvas>

  <div id="hint">Tilt your device to feel gravity pull the words apart</div>

  <div id="ios-overlay">
    <div id="ios-modal">
      <p>To feel the gravity effect, you need to allow motion access in your browser settings.</p>
      <button id="ios-btn" onclick="document.getElementById('ios-overlay').style.display='none'">OK</button>
    </div>
  </div>

<script>
// === Tilt Type ===
// A typographic experiment: gravity pulls letters apart as you tilt your device

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const input = document.getElementById('text-input');
const hint = document.getElementById('hint');

// Base text
let baseText = input.value;

// Character class codes (matching original)
const CHAR_CLASS = {
  'BN': 0,  // Break (newline/space)
  'B': 1,   // Break
  'S': 2,   // Space
  'WS': 3,  // Whitespace
  'ON': 4,  // Other Neutrals
  'ET': 5,  // East Asian Type
  'CS': 6,  // Carriage Return
  'EN': 7,  // European Number
  'L': 8,   // Letter
  'AN': 9,  // Arabic Number
};

// Compute default character class
function charClass(ch) {
  const code = ch.codePointAt(0);
  // Control
  if (code < 32) return 0;
  // Space
  if (ch === ' ' || ch === '\t') return 2;
  // Newline
  if (ch === '\n' || ch === '\r') return 0;
  // CJK
  if (code >= 0x4E00 && code <= 0x9FFF) return 8;
  if (code >= 0x3040 && code <= 0x30FF) return 8;
  // Arabic
  if (code >= 0x0600 && code <= 0x06FF) return 8;
  // European
  if ((code >= 65 && code <= 90) || (code >= 97 && code <= 122)) return 8;
  if (code >= 192 && code <= 255) return 8;
  // Numbers
  if (code >= 48 && code <= 57) return 7;
  // Other
  return 4;
}

// Build char data array
function buildChars(text) {
  const chars = [];
  const lines = text.split('\n');
  let y = 0;
  const fontSize = Math.min(window.innerWidth / text.length * 2.5, 72);

  for (let line of lines) {
    let x = 0;
    for (let ch of line) {
      const cc = charClass(ch);
      chars.push({
        ch,
        x,
        y,
        cc,
        vx: 0,
        vy: 0,
        baseX: x,
        baseY: y,
        fontSize,
        color: `hsl(${35 + cc * 17}, ${15 + cc * 5}%, ${90 - cc * 8}%)`,
      });
      x += measureChar(ch, fontSize);
    }
    y += fontSize * 1.4;
  }
  return chars;
}

function measureChar(ch, fontSize) {
  // Approximate monospace-ish width based on char type
  const cc = charClass(ch);
  if (cc === 2) return fontSize * 0.5; // space
  if (cc === 0) return fontSize * 0.1;  // newline handled separately
  // Chinese/Japanese get full width, others partial
  const code = ch.codePointAt(0);
  if ((code >= 0x4E00 && code <= 0x9FFF) || (code >= 0x3040 && code <= 0x30FF)) {
    return fontSize * 1.2;
  }
  return fontSize * 0.65;
}

let chars = buildChars(baseText);

// Gravity state
let gx = 0;  // gravity X
let gy = 0;  // gravity Y
let lastGx = 0, lastGy = 0;

// Friction / damping
const FRICTION = 0.92;
const GRAVITY_STRENGTH = 800; // pixels per second squared

// Resize canvas
function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = (window.innerHeight * 0.8) * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = (window.innerHeight * 0.8) + 'px';
  ctx.scale(dpr, dpr);
}

// Animation loop
let lastTime = null;

function animate(time) {
  if (!lastTime) lastTime = time;
  const dt = Math.min((time - lastTime) / 1000, 0.05); // clamp dt
  lastTime = time;

  // Smooth gravity
  gx += (lastGx - gx) * 0.1;
  gy += (lastGy - gy) * 0.1;

  // Clear
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Center offset
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;

  // Update & draw chars
  for (let c of chars) {
    // Spring force back to base
    const springK = 6 + c.cc * 0.8;
    const ax = -springK * (c.x - c.baseX) + gx;
    const ay = -springK * (c.y - c.baseY) + gy;

    c.vx = (c.vx + ay * 0.01 + ax * dt) * FRICTION;
    c.vy = (c.vy + ax * 0.01 + ay * dt) * FRICTION;

    c.x += c.vx * dt * 60;
    c.y += c.vy * dt * 60;

    // Draw
    ctx.fillStyle = c.color;
    ctx.font = `${c.fontSize}px Georgia, serif`;
    ctx.fillText(c.ch, cx + c.x - measureWidth(c.ch, c.fontSize) / 2, cy + c.y);
  }

  requestAnimationFrame(animate);
}

function measureWidth(ch, fontSize) {
  const code = ch.codePointAt(0);
  if ((code >= 0x4E00 && code <= 0x9FFF) || (code >= 0x3040 && code <= 0x30FF)) {
    return fontSize * 1.2;
  }
  return fontSize * 0.65;
}

function measureWidth(ch, fontSize) {
  return measureChar(ch, fontSize);
}

// Device orientation
function handleOrientation(e) {
  let beta = e.beta  || 0;  // front-back tilt (-180 to 180)
  let gamma = e.gamma || 0; // left-right tilt (-90 to 90)

  // Normalize
  lastGy = (beta / 90) * GRAVITY_STRENGTH;
  lastGx = (gamma / 90) * GRAVITY_STRENGTH;

  // Hide hint after first tilt
  hint.style.opacity = '0';
}

function requestOrientationAccess() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+
    DeviceOrientationEvent.requestPermission()
      .then(state => {
        if (state === 'granted') {
          window.addEventListener('deviceorientation', handleOrientation);
        } else {
          document.getElementById('ios-overlay').style.display = 'flex';
        }
      })
      .catch(() => {});
  } else {
    // Android / non-iOS
    window.addEventListener('deviceorientation', handleOrientation);
  }
}

// Click to start
canvas.addEventListener('click', () => {
  requestOrientationAccess();
  hint.textContent = 'Tilt your device to pull the words apart';
  setTimeout(() => { hint.style.opacity = '0'; }, 3000);
}, { once: true });

// Desktop: use mouse position as gravity
window.addEventListener('mousemove', (e) => {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  lastGx = ((e.clientX - cx) / cx) * GRAVITY_STRENGTH * 0.5;
  lastGy = ((e.clientY - cy) / cy) * GRAVITY_STRENGTH * 0.5;
  hint.style.opacity = '0';
});

// Render button
document.getElementById('render-btn').addEventListener('click', () => {
  baseText = input.value || 'Tilt Type';
  chars = buildChars(baseText);
});

// Also render on Enter
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    baseText = input.value || 'Tilt Type';
    chars = buildChars(baseText);
  }
});

// Init
resize();
window.addEventListener('resize', resize);

// Try to auto-enable on desktop
if (!('ontouchstart' in window)) {
  // Desktop: simulate gravity with mouse
  hint.textContent = 'Move your mouse to feel gravity pull the words apart';
} else {
  hint.textContent = 'Tap the screen, then tilt your device';
}

requestAnimationFrame(animate);
</script>
</body>
</html>
